<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>너구리 방귀 대탈출</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#1a2a4a;overflow:hidden;touch-action:none;}
#c{display:block;width:100%;height:100%;touch-action:none;}

/* UI 오버레이 */
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#score-disp{position:absolute;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-family:-apple-system,Arial,sans-serif;font-size:28px;font-weight:900;color:#fff;letter-spacing:-1px;text-shadow:0 0 20px rgba(80,160,255,0.8);}
#best-disp{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;font-family:-apple-system,Arial,sans-serif;font-size:13px;color:rgba(255,255,255,0.4);}

/* 오버레이 화면 */
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(8,8,20,0.92);font-family:-apple-system,Arial,sans-serif;pointer-events:all;padding:24px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));}
#ov-title{font-size:52px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#4af,#f4a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
#ov-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:32px;text-align:center;line-height:1.7;}
#ov-score{font-size:80px;font-weight:900;color:#fff;line-height:1;display:none;}
#ov-score-label{font-size:13px;color:rgba(255,255,255,0.4);margin-top:2px;display:none;}
#ov-best{font-size:14px;color:#f0c040;margin-top:6px;min-height:20px;}
#play-btn{padding:16px 52px;border-radius:50px;border:none;font-size:18px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4af,#a4f);color:white;margin-top:24px;-webkit-appearance:none;position:relative;z-index:60;min-width:200px;}
#ov-tip{font-size:12px;color:rgba(255,255,255,0.2);margin-top:16px;text-align:center;line-height:1.8;}

/* 속도 선택 */
#speed-select{display:flex;gap:8px;margin-bottom:20px;}
.spd-btn{padding:8px 20px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:all .2s;position:relative;z-index:60;}
.spd-btn.on{background:linear-gradient(135deg,#f84,#f4a);border-color:transparent;color:#fff;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score-disp">0</div>
  <div id="best-disp">최고: <span id="best-val">0</span></div>
</div>
<div id="overlay">
  <div id="ov-title">🦝 너구리 뿡뿡이</div>
  <div id="ov-sub">누를 때마다 너구리가 방귀로 날아요 💨<br>동굴 벽에 닿으면 끝!</div>
  <div id="ov-score">0</div>
  <div id="ov-score-label">점수</div>
  <div id="ov-best"></div>
  <div id="speed-select">
    <button class="spd-btn" id="spd-low">🐢 하</button>
    <button class="spd-btn on" id="spd-mid">🦝 중</button>
    <button class="spd-btn" id="spd-high">🔥 상</button>
  </div>
  <button id="play-btn">시작하기</button>
  <div id="ov-tip">클릭/터치할 때마다 방귀 한 방! 💨</div>
</div>

<script>
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;

// ── 상수 ──
var HELI_X=120;         // 헬기 고정 X
var HELI_W=52;          // 헬기 폭
var HELI_H=26;          // 헬기 높이
var GRAVITY=0.16;       // 중력
var LIFT=-0.28;         // 클릭 시 상승력
var MAX_VY=4.0;           // 최대 수직 속도
var TUNNEL_W=320;       // 터널 한 세그먼트 폭
var SEG_COUNT=6;        // 화면에 유지할 세그먼트 수
var SPEED_PRESETS={low:{base:1.2,inc:0.00012},mid:{base:2.2,inc:0.0003},high:{base:3.8,inc:0.0007}};
var selectedSpeed='mid';
var BASE_SPEED=3.5;     // 초기 스크롤 속도
var SPEED_INC=0.0006;   // 시간당 속도 증가

// ── 상태 ──
var vy=0,heliY=0;
var pressing=false;
var gameActive=false;
var score=0,frames=0;
var bestScore=+(localStorage.getItem('hBest')||0);
var scrollX=0;
var speed=BASE_SPEED;
var particles=[];
var isDead=false;
var deadTimer=0;

// 터널 세그먼트: {x, topH, botH}
// topH = 상단 벽 높이, botH = 하단 벽 높이
var segments=[];

// ── 리사이즈 ──
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

document.getElementById('best-val').textContent=bestScore;

// ── 터널 생성 ──
var tunnelSeed=0;
function rand(min,max){
  tunnelSeed=(tunnelSeed*16807+0)%2147483647;
  return min+(tunnelSeed%1000)/1000*(max-min);
}

var targetGapCenter=0.5; // 터널 중심 비율 (0~1)
var targetGapSize=0.62;  // 터널 폭 비율
var currentGapCenter=0.5;
var currentGapSize=0.62;

function genSegment(x){
  // 부드러운 변이
  targetGapCenter+=rand(-0.055,0.055);
  targetGapCenter=Math.max(0.25,Math.min(0.75,targetGapCenter));
  targetGapSize+=rand(-0.04,0.04);
  targetGapSize=Math.max(0.30,Math.min(0.64,targetGapSize));
  currentGapCenter+=(targetGapCenter-currentGapCenter)*0.35;
  currentGapSize+=(targetGapSize-currentGapSize)*0.35;

  // 난이도 반영: 속도 빠를수록 좁아짐
  var diffFactor=Math.min((speed-BASE_SPEED)/4,1);
  var gs=currentGapSize*(1-diffFactor*0.18);

  var topH=(currentGapCenter-gs/2)*H;
  var botH=H-(currentGapCenter+gs/2)*H;
  topH=Math.max(40,topH);
  botH=Math.max(40,botH);
  return{x:x,topH:topH,botH:botH};
}

function initTunnel(){
  tunnelSeed=Date.now()%2147483647;
  currentGapCenter=0.5;currentGapSize=0.52;
  targetGapCenter=0.5;targetGapSize=0.52;
  segments=[];
  for(var i=0;i<SEG_COUNT+2;i++){
    segments.push(genSegment(i*TUNNEL_W));
  }
}

// ── 헬기 그리기 ──
function drawRaccoon(x,y,tilt){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(tilt);
  var s=1.0; // 스케일

  // ── 몸통 ──
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.ellipse(0,2,22*s,16*s,0,0,Math.PI*2);ctx.fill();

  // 배 (밝은 부분)
  ctx.fillStyle='#ccc';
  ctx.beginPath();ctx.ellipse(2*s,4*s,12*s,10*s,0,0,Math.PI*2);ctx.fill();

  // ── 머리 ──
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.ellipse(16*s,-6*s,14*s,12*s,0,0,Math.PI*2);ctx.fill();

  // 얼굴 흰 부분
  ctx.fillStyle='#ddd';
  ctx.beginPath();ctx.ellipse(18*s,-5*s,9*s,8*s,0,0,Math.PI*2);ctx.fill();

  // 너구리 눈 마스크 (검정 줄)
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.ellipse(13*s,-7*s,5*s,3*s,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(20*s,-7*s,5*s,3*s,0.2,0,Math.PI*2);ctx.fill();

  // 눈 (흰자)
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(13*s,-7*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(20*s,-7*s,3*s,0,Math.PI*2);ctx.fill();
  // 눈동자
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(14*s,-7*s,1.5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(21*s,-7*s,1.5*s,0,Math.PI*2);ctx.fill();

  // 코
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.ellipse(26*s,-4*s,3*s,2*s,0,0,Math.PI*2);ctx.fill();

  // 귀
  ctx.fillStyle='#777';
  ctx.beginPath();ctx.ellipse(10*s,-17*s,5*s,6*s,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(20*s,-17*s,5*s,6*s,0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffaaaa';
  ctx.beginPath();ctx.ellipse(10*s,-17*s,2.5*s,3.5*s,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(20*s,-17*s,2.5*s,3.5*s,0.3,0,Math.PI*2);ctx.fill();

  // 팔 (앞으로 뻗은)
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.ellipse(10*s,8*s,5*s,10*s,0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(18*s,10*s,5*s,10*s,-0.2,0,Math.PI*2);ctx.fill();

  // 줄무늬 꼬리
  ctx.save();ctx.translate(-18*s,4*s);ctx.rotate(pressing?0.3:-0.1);
  var stripes=['#888','#ddd','#888','#ddd','#888'];
  for(var si=0;si<stripes.length;si++){
    ctx.fillStyle=stripes[si];
    ctx.beginPath();ctx.ellipse(0,si*5*s-8*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // ── 방귀 이펙트 ──
  if(pressing){
    // 엉덩이 위치에서 방귀 구름
    var bx=-20*s, by=8*s;
    for(var gi=0;gi<3;gi++){
      var gr=ctx.createRadialGradient(bx-(gi*8*s),by,0,bx-(gi*8*s),by,10*s+gi*4*s);
      gr.addColorStop(0,'rgba(180,220,80,0.55)');
      gr.addColorStop(0.5,'rgba(140,200,60,0.25)');
      gr.addColorStop(1,'rgba(100,180,40,0)');
      ctx.fillStyle=gr;
      ctx.beginPath();
      ctx.arc(bx-(gi*9*s),by+(Math.sin(gi)*4*s),(8+gi*3)*s,0,Math.PI*2);
      ctx.fill();
    }
    // 방귀 텍스트
    ctx.font='bold '+(11*s)+'px Arial';
    ctx.fillStyle='rgba(180,220,80,0.9)';
    ctx.textAlign='center';
    ctx.fillText('💨',-32*s,by-8*s);
  }

  ctx.restore();
}

// ── 터널 그리기 ──
function drawTunnel(){
  var lastTop=null,lastBot=null;

  for(var i=0;i<segments.length;i++){
    var seg=segments[i];
    var sx=seg.x-scrollX;
    var ex=sx+TUNNEL_W+1;

    // 상단 벽
    var grad1=ctx.createLinearGradient(0,0,0,seg.topH);
    grad1.addColorStop(0,'#3a5a8a');
    grad1.addColorStop(1,'#2a4a7a');
    ctx.fillStyle=grad1;
    ctx.beginPath();
    ctx.rect(sx,0,TUNNEL_W+1,seg.topH);
    ctx.fill();

    // 하단 벽
    var grad2=ctx.createLinearGradient(0,H-seg.botH,0,H);
    grad2.addColorStop(0,'#2a4a7a');
    grad2.addColorStop(1,'#3a5a8a');
    ctx.fillStyle=grad2;
    ctx.beginPath();
    ctx.rect(sx,H-seg.botH,TUNNEL_W+1,seg.botH);
    ctx.fill();

    // 벽 테두리 글로우
    // 경계선 외곽 글로우
    ctx.strokeStyle='rgba(80,180,255,0.3)';ctx.lineWidth=8;
    ctx.beginPath();ctx.moveTo(sx,seg.topH);ctx.lineTo(ex,seg.topH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,H-seg.botH);ctx.lineTo(ex,H-seg.botH);ctx.stroke();
    // 경계선 메인
    ctx.strokeStyle='rgba(120,210,255,0.95)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx,seg.topH);ctx.lineTo(ex,seg.topH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,H-seg.botH);ctx.lineTo(ex,H-seg.botH);ctx.stroke();

    // 암석 질감 (상단)
    ctx.fillStyle='rgba(150,200,255,0.12)';
    for(var ri=0;ri<3;ri++){
      var rx=sx+ri*(TUNNEL_W/3);
      var ry=seg.topH*0.3+ri*12;
      ctx.beginPath();ctx.ellipse(rx+20,ry,30,8,0.3,0,Math.PI*2);ctx.fill();
    }
  }

  // 배경 (터널 안)
  ctx.fillStyle='#1a2a4a';
  // 이미 캔버스 배경이 어두우니 추가 없음
}

// ── 파티클 ──
function addParticles(x,y,color,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2;
    var sp=1+Math.random()*4;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color:color,sz:2+Math.random()*4});
  }
}
function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.03;p.vx*=0.97;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.sz*p.life),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── 충돌 체크 ──
function checkCollision(){
  // 헬기 히트박스
  var hx=HELI_X, hy=heliY;
  var hw=HELI_W*0.42, hh=HELI_H*0.42;

  for(var i=0;i<segments.length;i++){
    var seg=segments[i];
    var sx=seg.x-scrollX;
    var ex=sx+TUNNEL_W;
    if(ex<hx-hw||sx>hx+hw)continue;

    // 상단 벽과 충돌
    if(hy-hh<seg.topH) return true;
    // 하단 벽과 충돌
    if(hy+hh>H-seg.botH) return true;
  }
  // 화면 경계
  if(hy-hh<0||hy+hh>H) return true;
  return false;
}

// ── 배경 별 ──
var bgStars=[];
function initStars(){
  bgStars=[];
  for(var i=0;i<60;i++){
    bgStars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,sp:0.3+Math.random()*0.7});
  }
}
initStars();
function drawStars(){
  for(var i=0;i<bgStars.length;i++){
    var s=bgStars[i];
    s.x-=s.sp*(speed/BASE_SPEED);
    if(s.x<0)s.x=W;
    ctx.fillStyle='rgba(200,220,255,0.5)';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
}

// ── 점수 표시 ──
var scoreEl=document.getElementById('score-disp');
var bestEl =document.getElementById('best-val');

// ── 방귀 사운드 ──
var audioCtx=null;
function getAC(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playFart(){
  var ac=getAC();if(!ac)return;
  try{
    var t=ac.currentTime;
    var dur=0.5+Math.random()*0.25;

    // ① 메인 노이즈 (방귀 본체)
    var buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
    var data=buf.getChannelData(0);
    var phase=0;
    for(var i=0;i<data.length;i++){
      // 진동하는 저음 노이즈
      phase+=0.08+Math.random()*0.04;
      var noise=(Math.random()*2-1);
      var vib=Math.sin(phase)*0.6;
      var env=Math.pow(1-i/data.length,0.4);
      data[i]=(noise*0.5+vib*0.5)*env;
    }
    var src=ac.createBufferSource();
    src.buffer=buf;

    // 로우패스 필터 (웅웅거리는 저음)
    var filt=ac.createBiquadFilter();
    filt.type='lowpass';
    filt.frequency.setValueAtTime(400,t);
    filt.frequency.exponentialRampToValueAtTime(60,t+dur);
    filt.Q.value=4;

    // 피치 진동 (뿡~ 하는 떨림)
    var filt2=ac.createBiquadFilter();
    filt2.type='bandpass';
    filt2.frequency.setValueAtTime(120+Math.random()*80,t);
    filt2.frequency.exponentialRampToValueAtTime(50,t+dur);
    filt2.Q.value=8;

    var gain=ac.createGain();
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(1.2,t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,t+dur);

    src.connect(filt);
    filt.connect(filt2);
    filt2.connect(gain);
    gain.connect(ac.destination);
    src.start(t);src.stop(t+dur+0.05);

    // ② 고음 끝소리 (뿌~ 마무리)
    var o2=ac.createOscillator();
    var g2=ac.createGain();
    o2.type='sawtooth';
    o2.frequency.setValueAtTime(180+Math.random()*60,t);
    o2.frequency.exponentialRampToValueAtTime(40,t+dur*0.8);
    g2.gain.setValueAtTime(0.6,t);
    g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.7);
    o2.connect(g2);g2.connect(ac.destination);
    o2.start(t);o2.stop(t+dur);

  }catch(e){ console.warn('fart error',e); }
}

// ── 메인 루프 ──
var tiltAngle=0;
var rotorAngle=0;
function loop(){
  requestAnimationFrame(loop);

  // 배경
  ctx.fillStyle='#1a2a4a';
  ctx.fillRect(0,0,W,H);
  drawStars();

  if(!gameActive){
    drawTunnel();
    return;
  }

  // 물리
  if(pressing) vy+=LIFT;
  else         vy+=GRAVITY;
  vy=Math.max(-MAX_VY,Math.min(MAX_VY,vy));
  heliY+=vy;

  // 기울기
  var targetTilt=vy*0.04;
  tiltAngle+=(targetTilt-tiltAngle)*0.15;

  // 스크롤
  scrollX+=speed;
  speed=BASE_SPEED+frames*SPEED_INC;
  frames++;
  score=Math.floor(frames/6);
  scoreEl.textContent=score;

  // 세그먼트 재활용
  var lastSeg=segments[segments.length-1];
  if(lastSeg.x-scrollX<W){
    segments.push(genSegment(lastSeg.x+TUNNEL_W));
  }
  while(segments.length>0&&segments[0].x-scrollX<-TUNNEL_W*2){
    segments.shift();
  }

  // 충돌
  if(!isDead&&checkCollision()){
    isDead=true;
    addParticles(HELI_X,heliY,'#888',20);
    addParticles(HELI_X,heliY,'#ff8',15);
    addParticles(HELI_X,heliY,'#f44',10);
    var isNew=score>bestScore;
    if(isNew){bestScore=score;localStorage.setItem('hBest',bestScore);bestEl.textContent=bestScore;}
    setTimeout(function(){showResult(isNew);},900);
  }

  // 로터 애니
  rotorAngle+=(pressing?0.35:0.25);

  drawTunnel();

  // 엔진 파티클
  if(pressing&&!isDead&&frames%3===0){
    addParticles(HELI_X-HELI_W*0.8,heliY+HELI_H*0.3,'rgba(160,220,60,0.8)',3);
  }
  // 비행 흔적
  if(!isDead&&frames%4===0){
    addParticles(HELI_X-HELI_W*0.8,heliY+8,'rgba(140,200,50,0.25)',2);
  }

  updateParticles();

  if(!isDead){


    drawRaccoon(HELI_X,heliY,tiltAngle);
  }

  // 속도 표시 (우하단)
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.font='11px -apple-system,Arial';
  ctx.textAlign='left';
  ctx.fillText('SPD '+(speed).toFixed(1)+'x',12,H-12-Math.max(0,parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sai-bottom')||0)));
  ctx.textAlign='center';
}

function showResult(isNew){
  gameActive=false;
  document.getElementById('ov-score').style.display='block';
  document.getElementById('ov-score-label').style.display='block';
  document.getElementById('ov-best').style.display='block';
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-best').textContent=isNew?'🏆 신기록!':'최고: '+bestScore+'점';
  document.getElementById('ov-sub').textContent='방귀가 다 떨어졌어요... 💨';
  var btn=document.getElementById('play-btn');
  btn.textContent='🦝 재도전!';
  btn.style.background='linear-gradient(135deg,#f84,#f4a)';
  document.getElementById('overlay').style.display='flex';
}

function startGame(){
  isDead=false;pressing=false;
  vy=0;heliY=H/2;
  var preset=SPEED_PRESETS[selectedSpeed];
  BASE_SPEED=preset.base;SPEED_INC=preset.inc;
  frames=0;score=0;speed=BASE_SPEED;
  scrollX=0;particles=[];tiltAngle=0;rotorAngle=0;
  initTunnel();
  initStars();
  scoreEl.textContent='0';
  // 버튼 원래대로
  var btn=document.getElementById('play-btn');
  btn.textContent='시작하기';
  btn.style.background='linear-gradient(135deg,#4af,#a4f)';
  document.getElementById('overlay').style.display='none';
  gameActive=true;
}

// 입력
var btnTouched=false;
var playBtn=document.getElementById('play-btn');

function addEL(el,ev,fn,opts){if(el)el.addEventListener(ev,fn,opts||false);}

addEL(playBtn,'touchstart',function(e){e.preventDefault();e.stopPropagation();},false);
addEL(playBtn,'touchend',function(e){e.preventDefault();e.stopPropagation();btnTouched=true;startGame();setTimeout(function(){btnTouched=false;},800);},false);
addEL(playBtn,'click',function(e){e.stopPropagation();if(btnTouched)return;startGame();},false);

// 헬기 조작 (게임 화면 전체)
addEL(document.body,'touchstart',function(e){
  if(!gameActive)return;
  // 오버레이나 버튼 터치면 게임 조작 무시
  var t=e.target;
  if(t.tagName==='BUTTON'||t.closest('#overlay'))return;
  e.preventDefault();
  if(!pressing)playFart();
  pressing=true;
},{passive:false});
addEL(document.body,'touchend',function(e){
  if(!gameActive)return;
  var t=e.target;
  if(t.tagName==='BUTTON'||t.closest('#overlay'))return;
  e.preventDefault();
  pressing=false;
},{passive:false});
addEL(document.body,'mousedown',function(e){
  if(!gameActive)return;
  if(e.target.tagName==='BUTTON'||e.target.closest('#overlay'))return;
  if(!pressing)playFart();
  pressing=true;
},false);
addEL(document.body,'mouseup',function(){pressing=false;},false);
// 탭 아웃 시 떼기
addEL(window,'blur',function(){pressing=false;},false);

// 속도 선택 버튼
['low','mid','high'].forEach(function(spd){
  var el=document.getElementById('spd-'+spd);
  function selectSpd(){
    selectedSpeed=spd;
    ['low','mid','high'].forEach(function(s){
      document.getElementById('spd-'+s).classList.toggle('on',s===spd);
    });
  }
  addEL(el,'touchstart',function(e){e.preventDefault();e.stopPropagation();},false);
  addEL(el,'touchend',function(e){e.preventDefault();e.stopPropagation();selectSpd();},false);
  addEL(el,'click',selectSpd,false);
});

loop();
</script>
</body>
</html>
